system {
	type = agat
	name = Агат
	version = Агат-9
	charmap = koi8
	debug = 0
}

cpu : 6502 {
	clock = 1021000
	stopped = 0
	~nmi=display.50hz
	~irq=display.500hz}

bios : rom {
	size = 2k
	image = A9-monitor.rom
}

font : rom {
	size = 2k
	image = A9-fnt.rom
}

boot840 : rom {
	size = 256
	image = flop840.boot.zagorsk.bin
}

ram : ram {
	size = 128k
}

port-kbd : port-address {
	~reset = port-kbd-reset.access
}

port-kbd-reset : port-address {}

port-kbd-ruslat : port-address {
	default = $80
}

port-C05x: port-address {}

port-C1xx: ram-address {
	size = 16
	address_shift = 4
	address_mask = $F
	value_shift = 0
	value_mask = $F
	~we = !pm.value
}

port-C7xx: port-address {}

pm: port-address {
	soft_reset = 0
	default = 0
	setmask = 1
}

pa: register {
	soft_reset = 0
	default = 1
	~in = !pm.value
	~c = port-C7xx.access
	~r = port-C05x.access
}

fdc840 : agat-fdc840 {
	drives = fdd0
	soft_reset = 0
}

fdd0 : fdd {
	sides = 2
	tracks = 80
	sectors = 21
	sector_size = 256
    mode = mfm_agat_840
	image = ikp1-16414.dsk
	files = "Disk images 840K (*.dsk)"
	files_save = "Disk images (*.dsk)"
	soft_reset = 0

	selector_value = 0
	~select = fdc840.select[0-1]
	~motor_on = fdc840.motor_on
}

display : agat-9-display {
	ram = ram
	font = font
	pa = pa
	mode_agat = port-C7xx
	mode_apple = port-C05x
	pal1 = port-pal1
	pal2 = port-pal2
	soft_reset = 0
	~ints_en = !port-int-en.value[6]
}

keyboard : map-keyboard {
	map = agat.map
	port-value = port-kbd
	ruslat = caps
	port-ruslat = port-kbd-ruslat
	rus-on = 0
	rus-bit = 7
}

port-int-en : port-address {
	default = 0
	soft_reset = 1
}

port-sound : port-address {}

port-pal1 : port-address {
	soft_reset = 0
}

port-pal2 : port-address {
	soft_reset = 0
}

sound : speaker {
	mode = flip
	~input = port-sound.access
}

main-mapper : agat-9-mapper{
	pm = pm
	ram = ram
	bios = bios
	page_map = port-C1xx
}

mapper : memory-mapper {
	portstomemory = 1

	@memory[$0000-$BFFF] = main-mapper
	@memory[$D000-$FFFF] = main-mapper[$D000]

	@memory[$C000-$C00F] = port-kbd
	@memory[$C010-$C01F] = port-kbd-reset
	@memory[$C020-$C02F] = port-int-en[$20]
	@memory[$C030-$C03F] = port-sound
	@memory[$C040-$C04F] = port-int-en[$40]
	@memory[$C050-$C057] = port-C05x
	@memory[$C058-$C059] = port-pal1
	@memory[$C05A-$C05B] = port-pal2
	@memory[$C063-$C063] = port-kbd-ruslat
	@memory[$C080-$C08F] = main-mapper[$C080]

	@memory[$C0D0-$C0DF] = fdc840

	@memory[$C0F0-$C0FF] = pm {mode = w}

	@memory[$C100-$C1FF] = port-C1xx
	@memory[$C500-$C5FF] = boot840 {mode = r}
	@memory[$C700-$C7FF] = port-C7xx

}



