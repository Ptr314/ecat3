system {
    type = irisha
    name = Ириша
    version = Ириша (КНГМД)
    charmap = koi8
}

cpu : i8080 {
    clock = 1777777
    ~int = pic.int
}

bios : rom {
    size = 16k
    image = irisha.rom
}

fddrom1 : rom {
    size = 64k
    image = irisha20.bin
}

fddrom2 : rom {
    size = 64k
    image = irisha20.bin
}

extrom : rom {
    mode = stream
    size = 64k
    image = extra.rom
}

ram0 : ram {
    size = 64k
}

fddram1 : ram {
    size = 64k
}

fddram2 : ram {
    size = 64k
}

display : irisha-display {
    vram = ram0
    mode = port-videomode
    color = port-color
    page = port-videopage
}

port-kbd : port {}

port-videomode : port {}

port-color : port {}

port-videopage : port {}

keyboard : map-keyboard {
    map = irisha.map
    port-value = port-kbd
    ruslat = caps
    rusmode = code
    use_remap = 0
    rus_switches = $0E/$0F
}

ikbd : register {
    ~s = keyboard.ready
    ~r = port-kbd.access
}

ppa : i8255 {
    ~B[7] = ikbd.out[0]
}

// Memory configuration
// Defaults to 0 by reset to use bios rom, then just translates port values
mconf : register {
    type = buffer
    default = 0
    ~in[0-1] = ppa.CL[2-3]
}

timer : i8253 {
    clock = 1/1
    clock1 = 1/256
    ~gate[2] = ppa.A[5]
}

sound : speaker {
    ~mixer[0] = timer.output[2]     // Timer sound
    ~mixer[1] = ppa.A[4]            // "Noise effects" output
    ~input = ppa.A[7]               // Output to tape
}

port38 : port {
    default = $28
    mask = $07
}

// RAM-FDC card presence indicator, goes to INT1
// 0 - to indicate FDC presents after reset
// 1 - after accessing card mode port
kngmd-res : register {
    default = 0
    ~s = port38.access
}

pic : i8259 {
    ~ir[0] = timer.output[1]
    ~ir[1] = ikbd.out[0]
    ~ir[2] = serial.rxrdy
    ~ir[3] = kngmd-res.out[0]
}

serial : i8251 {
    ~c = timer.output[0]
}

fdc : wd1793 {
    drives = fdd0|fdd1
}

port24 : port {}
port25 : port {}
port26 : port {}
port27 : port {}

mm0000 : page-mapper {
    pages = 16
    frame = 16k
    @page[#1110] = fddrom2
    @page[#1101] = fddram1
    @page[#1011] = fddram2
    @page[#0111] = fddrom1
    ~page = port24.value[0-3]
    ~segment = 0
}

mm4000 : page-mapper {
    pages = 16
    frame = 16k
    @page[#1110] = fddrom2
    @page[#1101] = fddram1
    @page[#1011] = fddram2
    @page[#0111] = fddrom1
    ~page = port25.value[0-3]
    ~segment = 1
}

mm8000 : page-mapper {
    pages = 16
    frame = 16k
    @page[#1110] = fddrom2
    @page[#1101] = fddram1
    @page[#1011] = fddram2
    @page[#0111] = fddrom1
    ~page = port26.value[0-3]
    ~segment = 2
}

mmC000 : page-mapper {
    pages = 16
    frame = 16k
    @page[#1110] = fddrom2
    @page[#1101] = fddram1
    @page[#1011] = fddram2
    @page[#0111] = fddrom1
    ~page = port27.value[0-3]
    ~segment = 3
}

fdd0 : fdd {
    sides = 2
    tracks = 40
    sectors = 9
    sector_size = 512
    selector_value = 0
    files = "Образы дисков Ириша (*.cpm)"
    ~select  = port38.value[0-1]
    ~side    = port38.value[2]
    ~motor_on = !fdc.hld
    image = 02.cpm
}

fdd1 : fdd {
    sides = 2
    tracks = 40
    sectors = 9
    sector_size = 512
    selector_value = 1
    files = "Образы дисков Ириша (*.cpm)"
    ~select  = port38.value[0-1]
    ~side    = port38.value[2]
    ~motor_on = !fdc.hld
}

tape : taperecorder {
    encoding = msx
    files = "BIN files (*.bin)"
    ~input  = ppa.A[7]
    ~output = serial.dsr
    ~motor = serial.dtr
}

mapper : memory-mapper {
    portstomemory = 0
    config = mconf

    @memory[0][$0000-$3FFF] =  bios {mode = r}
    @memory[0][$4000-$7FFF] =  ram0[$4000]
    @memory[0][$8000-$BFFF] =  ram0[$8000]
    @memory[0][$C000-$FFFF] =  ram0[$0000]

    @memory[2][$0000-$3FFF] =  ram0[$C000]
    @memory[2][$4000-$7FFF] =  ram0[$4000]
    @memory[2][$8000-$BFFF] =  ram0[$8000]
    @memory[2][$C000-$FFFF] =  ram0[$0000]

    @memory[1][$0000-$3FFF] =  ram0[$C000]
    @memory[1][$4000-$7FFF] =  mm0000
    @memory[1][$8000-$BFFF] =  ram0[$8000]
    @memory[1][$C000-$FFFF] =  mm4000

    @memory[3][$0000-$3FFF] =  ram0[$C000]
    @memory[3][$4000-$7FFF] =  mm8000
    @memory[3][$8000-$BFFF] =  ram0[$8000]
    @memory[3][$C000-$FFFF] =  mmC000

    @port[$04-$05] = port-kbd
    @port[$06-$07] = serial
    @port[$08-$0B] = timer
    @port[$0C-$0F] = pic
    @port[$10-$13] = ppa
    @port[$14] = extrom

    @port[$24] = port24
    @port[$25] = port25
    @port[$26] = port26
    @port[$27] = port27

    @port[$30-$33] = fdc
    @port[$34-$37] = fdc
    @port[$38] = port38

    @port[$D8] = port-videomode
    @port[$D9] = port-color
    @port[$DA] = port-videopage
}



