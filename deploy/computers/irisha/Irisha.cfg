system {
    type = irisha
    name = Ириша
    version = Ириша
    charmap = koi8
}

cpu : i8080 {
    clock = 1777777
}

bios : rom {
    size = 16k
    image = irisha.rom
}

vram : ram {
      size = 16k
}
ram1 : ram {
    size = 16k
}

ram2 : ram {
    size = 16k
}

display : irisha-display {
    vram  = vram
    mode = port-videomode
    color = port-color
    page = port-videopage
}

timer : i8253 {
    clock = 1/1
}

port-kbd : port {}

port-videomode : port {}

port-color : port {}

port-videopage : port {}

keyboard : map-keyboard {
    map = irisha.map
    port-value = port-kbd
    ruslat = caps
}

mapper : memory-mapper {
    portstomemory = 0
    @memory[$0000-$3FFF] =  bios {mode = r}
    @memory[$4000-$7FFF] =  ram1
    @memory[$8000-$BFFF] =  ram2
    @memory[$C000-$FFFF] =  vram
    @port[$04-$05] = port-kbd
    @port[$D8] = port-videomode
    @port[$D9] = port-color
    @port[$DA] = port-videopage
}



