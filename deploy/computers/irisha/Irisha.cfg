system {
    type = irisha
    name = Ириша
    version = Ириша
    charmap = koi8
}

cpu : i8080 {
    clock = 1777777
}

bios : rom {
    size = 16k
    image = irisha.rom
}

ram0 : ram {
    size = 64k
}

ram1 : ram {
    size = 16k
}

display : irisha-display {
    vram = ram0
    mode = port-videomode
    color = port-color
    page = port-videopage
}

timer : i8253 {
    clock = 1/1
}

port-kbd : port {}

port-videomode : port {}

port-color : port {}

port-videopage : port {}

keyboard : map-keyboard {
    map = irisha.map
    port-value = port-kbd
    ruslat = caps
}

ppa : i8255 {}

mconf : register {
    type = buffer
    default = 0
    ~in[0-1] = ppa.CL[2-3]
}

mapper : memory-mapper {
    portstomemory = 0
    config = mconf

    @memory[0][$0000-$3FFF] =  bios {mode = r}
    @memory[0][$4000-$7FFF] =  ram0[$4000]
    @memory[0][$8000-$BFFF] =  ram0[$8000]
    @memory[0][$C000-$FFFF] =  ram0[$0000]

    @memory[2][$0000-$3FFF] =  ram0[$C000]
    @memory[2][$4000-$7FFF] =  ram0[$4000]
    @memory[2][$8000-$BFFF] =  ram0[$8000]
    @memory[2][$C000-$FFFF] =  ram0[$0000]

    @memory[1][$0000-$3FFF] =  ram0[$C000]
    @memory[1][$4000-$7FFF] =  ram1[$0000]
    @memory[1][$8000-$BFFF] =  ram0[$8000]
    @memory[1][$C000-$FFFF] =  ram1[$4000]

    @memory[3][$0000-$3FFF] =  ram0[$C000]
    @memory[3][$4000-$7FFF] =  ram1[$8000]
    @memory[3][$8000-$BFFF] =  ram0[$8000]
    @memory[3][$C000-$FFFF] =  ram1[$C000]

    @port[$04-$05] = port-kbd
    @port[$10-$13] = ppa
    @port[$D8] = port-videomode
    @port[$D9] = port-color
    @port[$DA] = port-videopage
}



