system {
    type = irisha
    name = Ириша
    version = Ириша
    charmap = koi8
}

cpu : i8080 {
    clock = 1777777
    ~int = pic.int
}

bios : rom {
    size = 16k
    image = irisha.rom
}

exrom : rom {
    mode = stream
    size = 64k
    image = extra.rom
}

ram0 : ram {
    size = 64k
}

ram1 : ram {
    size = 64k
}

display : irisha-display {
    vram = ram0
    mode = port-videomode
    color = port-color
    page = port-videopage
}

port-kbd : port {}

port-videomode : port {}

port-color : port {}

port-videopage : port {}

keyboard : map-keyboard {
    map = irisha.map
    port-value = port-kbd
    ruslat = caps
    rusmode = code
    use_remap = 0
    rus_switches = $0E/$0F
}

ikbd : register {
    ~s = keyboard.ready
    ~r = port-kbd.access
}

ppa : i8255 {
    ~B[7] = ikbd.out[0]
}

// Memory configuration
// Defaults to 0 by reset to use bios rom, then just translates port values
mconf : register {
    type = buffer
    default = 0
    ~in[0-1] = ppa.CL[2-3]
}

timer : i8253 {
    clock = 1/1
    clock1 = 1/256
    ~gate[2] = ppa.A[5]
}

sound : speaker {
    ~mixer[0] = timer.output[2]     // Timer sound
    ~mixer[1] = ppa.A[4]            // "Noise effects" output
    ~input = ppa.A[7]               // Output to tape
}

pic : i8259 {
    ~ir[0] = timer.output[1]
    ~ir[1] = ikbd.out[0]
}

serial : i8251 {
    ~c = timer.output[0]
}

fdc : gmd70 {
    drives = fdd0|fdd1
}

fdd0 : fdd {
    sides = 1
    tracks = 77
    sectors = 26
    sector_size = 128
    selector_value = 0
    files = "Образы дисков Ириша (*.gmd)"
    ~select   = fdc.select
    ~motor_on = fdc.motor
    image = disk5.gmd
}

fdd1 : fdd {
     sides = 1
     tracks = 77
     sectors = 26
     sector_size = 128
     selector_value = 1
     files = "Образы дисков Ириша (*.gmd)"
     ~select   = fdc.select
     ~motor_on = fdc.motor
}

tape : taperecorder {
    encoding = msx
    files = "BIN files (*.bin)"
    ~input  = ppa.A[7]
    ~output = serial.dsr
    ~motor = serial.dtr
}

mapper : memory-mapper {
    portstomemory = 0
    config = mconf

    @memory[0][$0000-$3FFF] =  bios {mode = r}
    @memory[0][$4000-$7FFF] =  ram0[$4000]
    @memory[0][$8000-$BFFF] =  ram0[$8000]
    @memory[0][$C000-$FFFF] =  ram0[$0000]

    @memory[2][$0000-$3FFF] =  ram0[$C000]
    @memory[2][$4000-$7FFF] =  ram0[$4000]
    @memory[2][$8000-$BFFF] =  ram0[$8000]
    @memory[2][$C000-$FFFF] =  ram0[$0000]

    @memory[1][$0000-$3FFF] =  ram0[$C000]
    @memory[1][$4000-$7FFF] =  ram1[$0000]
    @memory[1][$8000-$BFFF] =  ram0[$8000]
    @memory[1][$C000-$FFFF] =  ram1[$4000]

    @memory[3][$0000-$3FFF] =  ram0[$C000]
    @memory[3][$4000-$7FFF] =  ram1[$8000]
    @memory[3][$8000-$BFFF] =  ram0[$8000]
    @memory[3][$C000-$FFFF] =  ram1[$C000]

    @port[$04-$05] = port-kbd
    @port[$06-$07] = serial
    @port[$08-$0B] = timer
    @port[$0C-$0F] = pic
    @port[$10-$13] = ppa
    @port[$14] = exrom
    @port[$50-$51] = fdc
    @port[$D8] = port-videomode
    @port[$D9] = port-color
    @port[$DA] = port-videopage
}



