<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>eCat3 - 8-bit Computer Emulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 12px 24px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #e94560;
            margin-right: 8px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        select, button, input[type="file"] {
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #533483;
            border-radius: 4px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
        }

        select:hover, button:hover {
            background: #1a4a7a;
        }

        button:active {
            background: #533483;
        }

        button:disabled, select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .volume-control label {
            font-size: 13px;
            color: #aaa;
        }

        input[type="range"] {
            width: 80px;
            accent-color: #e94560;
        }

        #canvas-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        #canvas {
            background: #000;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid #0f3460;
            border-radius: 4px;
        }

        #status {
            padding: 8px 24px;
            width: 100%;
            background: #16213e;
            border-top: 1px solid #0f3460;
            font-size: 12px;
            color: #888;
            text-align: center;
        }

        #status.loading {
            color: #e94560;
        }

        #status.error {
            color: #ff4444;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-input-wrapper button {
            pointer-events: none;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            cursor: pointer;
        }

        #overlay.hidden { display: none; }

        #overlay-text {
            color: #fff;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="overlay" class="hidden">
    </div>

    <header>
        <h1>eCat3</h1>
        <div class="controls">
            <select id="machine-select" disabled>
                <option value="">Loading machines...</option>
            </select>
            <button id="btn-reset" disabled title="Warm reset">Reset</button>
            <button id="btn-cold-reset" disabled title="Cold reset (power cycle)">Power</button>
            <div class="volume-control">
                <label>Vol</label>
                <input type="range" id="volume" min="0" max="100" value="80">
            </div>
            <div class="file-input-wrapper">
                <button>Load Disk</button>
                <input type="file" id="disk-file" accept=".dsk,.mfm,.hfe,.nib,.nic,.aim" disabled>
            </div>
        </div>
    </header>

    <div id="canvas-container">
        <canvas id="canvas" width="512" height="256" tabindex="0"></canvas>
    </div>

    <div id="status">Initializing...</div>

    <script defer src="ecat3.js"></script>
    <script defer src="ecat_wasm.js"></script>
</body>
</html>
